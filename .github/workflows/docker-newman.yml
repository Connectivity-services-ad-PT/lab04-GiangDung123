name: Lab04 Docker and Newman Verification

on:
  push:
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Build Docker image
        run: docker build -t fit4110/iot-ingestion:lab04 .

      - name: Run Docker container
        run: |
          docker run -d --name fit4110-iot-lab04 \
          -p 8000:8000 \
          -e API_TOKEN=secret_api_token \
          fit4110/iot-ingestion:lab04

          sleep 10

          echo "=== Docker PS ==="
          docker ps -a

          echo "=== Container Logs ==="
          docker logs fit4110-iot-lab04

          echo "=== Health Check ==="
          curl -v http://localhost:8000/health || true
       
      - name: Debug container
        run: |
          echo "=== Docker PS ==="
          docker ps -a

          echo "=== Container Logs ==="
          docker logs fit4110-iot-lab04

          echo "=== Curl Health ==="
          curl -v http://localhost:8000/health

      - name: Wait for service health
        run: |
          for i in {1..60}; do
            curl -f http://localhost:8000/health && exit 0
            sleep 2
            done

            echo "Health check failed"
          docker logs fit4110-iot-lab04
          exit 1

      - name: Run Newman against Docker container
        run: npm run test:local

      - name: Show container logs on failure
        if: failure()
        run: docker logs fit4110-iot-lab04 || true

      - name: Stop container
        if: always()
        run: docker stop fit4110-iot-lab04 || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-newman-reports
          path: reports/